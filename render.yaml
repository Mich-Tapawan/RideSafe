# Render Blueprint: https://render.com/docs/blueprint-spec
databases:
  - name: ridesafe-db
    plan: free
    databaseName: ridesafe
    user: ridesafe

services:
  - type: web
    name: ridesafe
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: WKHTMLTOPDF_PATH
        value: /usr/bin/wkhtmltopdf
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GOOGLE_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: ridesafe-db
          property: connectionString
